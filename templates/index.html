<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mr.Red Banana 暇人チャッツ</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

/* 全体 */
body {
    margin: 0;
    font-family: sans-serif;
}

/* 背景画像（←これがあなたのデザインそのまま） */
#homeArea {
    width: 100vw;
    height: 100vh;
    background: url("/static/背景1.svg") no-repeat center center;
    background-size: cover;
    position: relative;
}

/* ボタン共通 */
.btn {
    position: absolute;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

/* ルーム作成ボタン（位置はあとで微調整） */
#createBtn {
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* 参加入力 */
#roomInput {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 10px;
    font-size: 16px;
    width: 200px;
}

/* 参加ボタン */
#joinBtn {
    top: 65%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* 履歴 */
#history {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
}

</style>

</head>

<body>

<div id="homeArea">

    <button id="createBtn" class="btn" onclick="createRoom()">ルーム作成</button>

    <input id="roomInput" placeholder="8桁ID" maxlength="8">

    <button id="joinBtn" class="btn" onclick="joinRoom()">参加</button>

    <div id="history">
        <h3>履歴</h3>
        <ul>
        {% for r in room_history %}
            <li onclick="joinHistory('{{ r[0] }}')">
                {{ r[0] }}
            </li>
        {% endfor %}
        </ul>
    </div>

</div>

<script>

var socket = io();

/* 数字制限 */
document.getElementById("roomInput").addEventListener("input", function(){
    this.value = this.value.replace(/[^0-9]/g, "");
});

/* ルーム作成 */
function createRoom(){
    socket.emit("create_room");
}

/* 参加 */
function joinRoom(){
    var roomId = document.getElementById("roomInput").value;

    if(!/^[0-9]{8}$/.test(roomId)){
        alert("8桁の数字のみ！");
        return;
    }

    socket.emit("join_room_by_id",{room:roomId});
}

/* 履歴クリック */
function joinHistory(roomId){
    socket.emit("join_room_by_id",{room:roomId});
}

</script>

</body>
</html>
