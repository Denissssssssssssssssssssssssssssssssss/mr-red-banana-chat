<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mr.Red Banana 暇人チャッツ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{font-family:Arial;margin:20px;background:#111;color:white;}
#main{margin-top:80px;}
#messages{height:300px;overflow-y:scroll;border:1px solid gray;padding:10px;background:#222;border-radius:10px;}
#messages li{background:#222;padding:8px;margin:6px 0;border-radius:8px;list-style:none;}
#messages li.me{color:#38b48b;font-weight:bold;}
button{margin:5px;padding:8px;border:none;border-radius:6px;background:#777;color:white;}
input{padding:8px;border-radius:6px;border:none;}
.history-item input{background:#444;color:white;margin-left:10px;}
.check{color:#38b48b;margin-left:5px;opacity:0;}
.check.show{opacity:1;}
.delete{background:#dc143c;}
</style>
</head>

<body>

<div id="main">

<h2>こんにちは {{ username }} さん</h2>
<a href="/logout">ログアウト</a>

<hr>

<div id="homeArea">

<button onclick="createRoom()">ルーム作成</button><br><br>

<input id="roomInput" placeholder="8桁ID" maxlength="8">
<button onclick="joinRoom()">参加</button>

<h3>履歴</h3>

<ul>
{% for r in room_history %}
<li class="history-item">
ルームID : {{ r[0] }}

<input value="{{ r[1] or '' }}" oninput="saveNote('{{ r[0] }}', this)">

<span class="check" id="check-{{ r[0] }}">✔</span>

<button onclick="joinHistory('{{ r[0] }}')">参加</button>
<button class="delete" onclick="deleteRoom('{{ r[0] }}')">削除</button>
</li>
{% endfor %}
</ul>

</div>

<div id="chatArea" style="display:none;">
<h3 id="roomTitle"></h3>
<button onclick="leaveRoom()">退出</button>
<ul id="messages"></ul>
<input id="msg">
<button onclick="sendMessage()">送信</button>
</div>

</div>

<script>

var socket=io();
var currentRoom=null;

function createRoom(){socket.emit("create_room");}

function joinRoom(){
let id=document.getElementById("roomInput").value;
if(!/^[0-9]{8}$/.test(id)) return alert("8桁数字");
socket.emit("join_room_by_id",{room:id});
}

function joinHistory(id){socket.emit("join_room_by_id",{room:id});}

function saveNote(id,input){
fetch("/save_note",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({room:id,note:input.value})})
.then(()=>{
let c=document.getElementById("check-"+id);
c.classList.add("show");
setTimeout(()=>c.classList.remove("show"),1500);
});
}

function deleteRoom(id){
if(!confirm("本当にルームID："+id+"を削除しますか？")) return;
fetch("/delete_room",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({room:id})})
.then(()=>location.reload());
}

function leaveRoom(){
socket.emit("leave_room",{room:currentRoom});
location.reload();
}

function sendMessage(){
let msg=document.getElementById("msg").value;
if(msg) socket.emit("message",{room:currentRoom,message:msg});
document.getElementById("msg").value="";
}

socket.on("room_created",d=>{currentRoom=d.room;enter(d.room);});
socket.on("joined",d=>{currentRoom=d.room;enter(d.room);});

socket.on("chat_message",d=>{
let li=document.createElement("li");
li.textContent=d.username+" : "+d.message;
if(d.username=="{{username}}") li.classList.add("me");
document.getElementById("messages").appendChild(li);
});

function enter(id){
homeArea.style.display="none";
chatArea.style.display="block";
roomTitle.innerText="ルーム："+id;
messages.innerHTML="";
}

</script>

</body>
</html>
